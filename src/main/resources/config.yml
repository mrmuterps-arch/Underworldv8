# Underworld — настройки Мёртвой пустоши

# Имя мира-измерения (папка мира на сервере)
world-name: "underworld"

# Высота плиты пустоши у точки спавна (чанк 0,0)
anchor-top-y: 70

# Принудительный режим приключений для обычных игроков в подмире
# (Хранители с правом underworld.build его не получают и могут строить)
force-adventure: true

# Руины
ruins:
  chance: 40   # примерно 1 руина на N чанков (больше = реже)

# Кристальный разлом (редкий аметистовый акцент)
crystal:
  chance: 130  # 1 структура на N чанков

# Заброшенные деревни (лор: вирус/война)
village:
  region-chunks: 24          # размер региона в чанках; в регионе максимум одна деревня
  region-chance-percent: 55  # шанс, что в регионе вообще есть деревня
  house-chance-percent: 45   # шанс дома в каждом чанке рядом с центром деревни

# Мобы пустоши (зомби с оружием, зимогоры в незеритке; экипировка не выпадает)
mobs:
  interval-seconds: 12       # как часто пытаться спавнить возле каждого игрока
  spawn-chance-percent: 20   # шанс попытки
  max-near-player: 4         # максимум монстров рядом с игроком

# Порог падения: ниже этого Y в ОБЫЧНОМ мире игрока затягивает в подмир
overworld-fall-y: -70

# Порог падения в АДУ (низ мира Y=0, ниже бедрока)
nether-fall-y: -6

# Порог падения в САМОМ подмире: провалился сквозь каньон ниже — "побег" в обычный мир
underworld-escape-y: -32

# Эффекты при входе в подмир (секунды)
effects:
  darkness-seconds: 8
  slow-falling-seconds: 12

# Сообщения (MiniMessage)
messages:
  enter: "<dark_gray>Ты провалился в <gray>Мёртвую пустошь<dark_gray>..."
  escape: "<gray>Пустота выплюнула тебя обратно в обычный мир."
  no-build: "<dark_gray>Пустошь не подчиняется тебе. Строить могут только Хранители."
